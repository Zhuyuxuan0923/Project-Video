services:
  redis:
    image: redis:7-alpine
    container_name: drama-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data

  flower:
    image: mher/flower:2.0
    container_name: drama-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
