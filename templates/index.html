<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Drama Studio</title>
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e1e4ed; --muted: #8b8fa3; --accent: #6366f1; --ok: #22c55e; --warn: #f59e0b; --err: #ef4444; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  header { display: flex; align-items: center; gap: 12px; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  header h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header span { font-size: 0.8rem; color: var(--muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 1rem; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  form { display: flex; flex-direction: column; gap: 12px; }
  input, select, button { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.9rem; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  button { background: var(--accent); border-color: var(--accent); cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .task-item { padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
  .task-item .left { display: flex; flex-direction: column; gap: 2px; }
  .task-item .topic { font-weight: 600; }
  .task-item .meta { font-size: 0.75rem; color: var(--muted); }
  .badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: 600; }
  .badge-PENDING { background: #374151; color: #9ca3af; }
  .badge-STARTED, .badge-RECEIVED { background: #1e3a5f; color: #60a5fa; }
  .badge-SUCCESS { background: #14532d; color: var(--ok); }
  .badge-FAILURE { background: #450a0a; color: var(--err); }
  .result-area { margin-top: 16px; }
  .result-area video { width: 100%; border-radius: 8px; background: #000; }
  .result-area img { width: 100%; border-radius: 8px; margin: 4px 0; }
  .result-area .narration { margin: 8px 0; padding: 12px; background: var(--bg); border-radius: 8px; font-style: italic; color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 32px 0; }
  .flow-indicator { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; font-size: 0.8rem; color: var(--muted); }
  .flow-indicator .step { padding: 4px 10px; border-radius: 6px; background: var(--bg); }
  .flow-indicator .step.active { background: var(--accent); color: #fff; }
  .flow-indicator .step.done { background: #14532d; color: var(--ok); }
  .flow-indicator .arrow { margin: 0 -2px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>AI Drama Studio</h1>
    <span>beta</span>
  </header>

  <div class="grid">
    <div class="card">
      <h2>New Drama</h2>
      <form id="drama-form" onsubmit="submitTask(event)">
        <input type="text" name="topic" id="topic" placeholder="Enter a topic, e.g. 'Cyberpunk Wuxia'" required autofocus>
        <select name="backend" id="backend">
          <option value="mock">Mock AI (demo)</option>
        </select>
        <button type="submit" id="submit-btn">Generate</button>
      </form>
      <div id="progress" style="margin-top:12px;"></div>
      <div id="result" class="result-area"></div>
    </div>

    <div class="card">
      <h2>Task History</h2>
      <div id="task-list"><div class="empty">No tasks yet</div></div>
    </div>
  </div>
</div>

<script>
const STATE_LABEL = {PENDING:'Waiting', RECEIVED:'Queued', STARTED:'Running', RETRY:'Retrying', SUCCESS:'Done', FAILURE:'Failed'};

async function submitTask(e) {
  e.preventDefault();
  const topic = document.getElementById('topic').value.trim();
  if (!topic) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  const form = new FormData();
  form.append('topic', topic);
  form.append('backend', document.getElementById('backend').value);
  const resp = await fetch('/api/submit', {method:'POST', body:form});
  const data = await resp.json();
  document.getElementById('topic').value = '';
  btn.disabled = false;
  btn.textContent = 'Generate';
  showProgress(data.id, data.stage);
  loadTasks();
}

function showProgress(taskId, stage) {
  const div = document.getElementById('progress');
  const stageKeys = [{% for k in stage_keys %}'{{ k }}',{% endfor %}];
  const stageLabels = [{% for l in stage_labels %}'{{ l }}',{% endfor %}];
  let html = '<div class="flow-indicator">';
  let done = false;
  for (let i = 0; i < stageKeys.length; i++) {
    if (stageKeys[i] === stage && !done) { html += `<span class="step active">${stageLabels[i]}</span>`; }
    else if (stageKeys.indexOf(stage) > i) { html += `<span class="step done">${stageLabels[i]}</span>`; }
    else { html += `<span class="step">${stageLabels[i]}</span>`; }
    if (i < stageKeys.length - 1) html += '<span class="arrow">&rarr;</span>';
  }
  html += '</div>';
  div.innerHTML = html;
  pollStage(taskId, stage);
}

async function pollStage(taskId, stage) {
  const interval = setInterval(async () => {
    const resp = await fetch(`/api/task/${taskId}`);
    const data = await resp.json();
    if (data.state === 'SUCCESS') {
      clearInterval(interval);
      advanceStage(taskId, stage, data.result);
    } else if (data.state === 'FAILURE') {
      clearInterval(interval);
      document.getElementById('progress').innerHTML = `<p style="color:var(--err)">Failed: ${data.error || 'unknown'}</p>`;
      loadTasks();
    }
  }, 1500);
}

async function advanceStage(taskId, currentStage, prevResult) {
  const stageKeys = [{% for k in stage_keys %}'{{ k }}',{% endfor %}];
  const idx = stageKeys.indexOf(currentStage);
  if (idx < 0 || idx >= stageKeys.length - 1) {
    showFinalResult(prevResult);
    loadTasks();
    return;
  }
  const nextStage = stageKeys[idx + 1];
  const form = new FormData();
  form.append('task_id', taskId);
  form.append('stage', currentStage);
  const resp = await fetch('/api/advance', {method:'POST', body:form});
  const data = await resp.json();
  if (data.error) { showFinalResult(prevResult); loadTasks(); return; }
  showProgress(data.id, nextStage);
}

function showFinalResult(result) {
  const div = document.getElementById('result');
  if (!result) return;
  let html = '';
  if (result.video && result.video.video_url) {
    html += `<p style="margin:8px 0;font-weight:600;">${result.title || ''}</p>`;
    html += `<video controls><source src="${result.video.video_url}" type="video/mp4"></video>`;
    html += `<p style="font-size:0.8rem;color:var(--muted);">Duration: ${result.video.duration}s | ${result.video.resolution}</p>`;
  }
  if (result.images) {
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">';
    result.images.forEach(img => { html += `<img src="${img.url}" alt="Scene ${img.scene_id}" loading="lazy">`; });
    html += '</div>';
  }
  if (result.narration) {
    html += '<div class="narration">';
    result.narration.forEach(n => { html += `<p>${n}</p>`; });
    html += '</div>';
  }
  div.innerHTML = html;
  document.getElementById('progress').innerHTML = '';
}

async function loadTasks() {
  const resp = await fetch('/api/tasks');
  const tasks = await resp.json();
  const div = document.getElementById('task-list');
  if (!tasks.length) { div.innerHTML = '<div class="empty">No tasks yet</div>'; return; }
  let html = '';
  tasks.forEach(t => {
    const badge = STATE_LABEL[t.state] || t.state;
    html += `<div class="task-item">
      <div class="left">
        <span class="topic">${esc(t.topic)}</span>
        <span class="meta">${t.submitted_at} &middot; ${t.stage} &middot; ${t.backend}</span>
      </div>
      <span class="badge badge-${t.state}">${badge}</span>
    </div>`;
  });
  div.innerHTML = html;
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadTasks();
setInterval(loadTasks, 3000);
</script>
</body>
</html>
